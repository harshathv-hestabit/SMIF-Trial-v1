name: SMIF-v1

networks:
  finance-net:
    driver: bridge

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    hostname: azurite
    environment:
      - AZURITE_DISABLE_TELEMETRY=true
      - AZURITE_ACCOUNTS=devstoreaccount1:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;mylocalaccount:bXlsb2NhbHNlY3JldGtleTEyMw==
    ports:
      - "10000:10000"   # Blob service
      - "10001:10001"   # Queue service
      - "10002:10002"   # Table service
    volumes:
      - azurite_data:/data
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --debug /data/azurite-debug.log
      --skipApiVersionCheck
    networks:
      - finance-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(10000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Cosmos DB Emulator
  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cosmos-emulator
    hostname: cosmos-emulator
    ports:
      - "8081:8081"
      - "10251:10251"
      - "10252:10252"
      - "10253:10253"
      - "10254:10254"
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=3
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
      - PROTOCOL=https
      - EXPLORER_PROTOCOL=https
      - GATEWAY_PUBLIC_ENDPOINT=cosmos-emulator
      # - AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE=127.0.0.1
    volumes:
      - cosmos_data:/tmp/cosmos/appdata
    networks:
      finance-net:
        aliases:
          - cosmos-emulator.DOMAIN
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8081/_explorer/index.html"]
      interval: 20s
      timeout: 10s
      retries: 2
      start_period: 10s

  # EventHub Emulator
  # Requires: app/common/azure_services/eventhub-config.json
  eventhub:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest
    container_name: eventhub-emulator
    hostname: eventhub-emulator
    ports:
      - "127.0.0.1:5672:5672"     # AMQP for local Functions host
      - "127.0.0.1:9092:9092"
    volumes:
      - ./app/common/azure_services/eventhub-config.json:/Eventhubs_Emulator/ConfigFiles/Config.json
    environment:
      - ACCEPT_EULA=Y
      - BLOB_SERVER=azurite
      - METADATA_SERVER=azurite
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - finance-net

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: servicebus-emulator
    hostname: servicebus-emulator
    ports:
      - "127.0.0.2:5672:5672"     # AMQP for local Functions host
      - "127.0.0.2:5300:5300"     # Management and health APIs
    volumes:
      - ./app/common/azure_services/servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    environment:
      - SQL_SERVER=mssql
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-ServiceBus_Emulator_123!}
      - ACCEPT_EULA=${ACCEPT_EULA:-Y}
      - EMULATOR_HTTP_PORT=${EMULATOR_HTTP_PORT:-5300}
      - SQL_WAIT_INTERVAL=${SQL_WAIT_INTERVAL:-15}
    depends_on:
      mssql:
        condition: service_started
    networks:
      finance-net:
        aliases:
          - servicebus-emulator

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    hostname: mssql
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA:-Y}
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-ServiceBus_Emulator_123!}
    networks:
      - finance-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - finance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # DPS Streamlit UI
  dps:
    build:
      context: .
      dockerfile: app/modules/DPS/.dockerfile
    container_name: dps-dashboard
    hostname: dps
    ports:
      - "8501:8501"     # Streamlit UI
    env_file:
      - .env.docker
    command:
      - streamlit
      - run
      - app/modules/DPS/streamlit_app.py
      - --server.headless=true
      - --server.port=8501
    volumes:
      - ./.env.docker:/app/.env:ro
      - ./requirements.txt:/app/requirements.txt:ro
    depends_on:
      azurite:
        condition: service_healthy
      cosmos:
        condition: service_healthy
    networks:
      - finance-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mas:
    build:
      context: .
      dockerfile: app/modules/MAS/.dockerfile
    container_name: mas
    hostname: mas
    env_file:
      - .env.docker
    volumes:
      - ./.env.docker:/app/.env:ro
      - ./requirements.txt:/app/requirements.txt:ro
    depends_on:
      azurite:
        condition: service_healthy
      cosmos:
        condition: service_healthy
      servicebus-emulator:
        condition: service_started
    networks:
      - finance-net
    restart: on-failure

  insight_feed_service:
    build:
      context: .
      dockerfile: app/modules/FEED/.dockerfile
    container_name: insight-feed
    hostname: insight-feed-service
    ports:
      - "8502:8502"
    env_file:
      - .env.docker
    volumes:
      - ./.env.docker:/app/.env:ro
      - ./requirements.txt:/app/requirements.txt:ro
    depends_on:
      cosmos:
        condition: service_healthy
    networks:
      - finance-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  functions:
    build:
      context: .
      dockerfile: app/functions/.dockerfile
    container_name: azure-functions
    hostname: azure-functions
    ports:
      - "7071:80"
    env_file:
      - .env.docker
    volumes:
      - ./.env.docker:/app/.env:ro
    depends_on:
      azurite:
        condition: service_healthy
      cosmos:
        condition: service_healthy
      servicebus-emulator:
        condition: service_started
    networks:
      - finance-net
    restart: on-failure

  news_provider:
    build:
      context: .
      dockerfile: app/modules/NEWS_PROVIDER/.dockerfile
    container_name: news-provider
    hostname: news-provider
    ports:
      - 0.0.0.0:8080:8080
    env_file:
      - .env.docker
    volumes:
      - ./.env.docker:/app/.env:ro
    networks:
      - finance-net
    restart: on-failure

  dps_news_processor:
    build:
      context: .
      dockerfile: app/modules/DPS/services/news_processor/.dockerfile
    container_name: dps-news-processor
    hostname: news-processor
    env_file:
      - .env.docker
    volumes:
      - ./.env.docker:/app/.env:ro
      - ./requirements.txt:/app/requirements.txt:ro
    depends_on:
      azurite:
        condition: service_healthy
      cosmos:
        condition: service_healthy
      eventhub:
        condition: service_started
    networks:
      - finance-net
    restart: on-failure

  dps_client_processor:
    build:
      context: .
      dockerfile: app/modules/DPS/services/client_processor/.dockerfile
    container_name: dps-client-processor
    hostname: dps-client-processor
    env_file:
      - .env.docker
    volumes:
      - ./.env.docker:/app/.env:ro
      - ./requirements.txt:/app/requirements.txt:ro
      - ./app/modules/DPS/services/client_processor/portfolio.csv:/app/app/modules/DPS/services/client_processor/portfolio.csv:ro
    depends_on:
      cosmos:
        condition: service_healthy
    networks:
      - finance-net
    restart: on-failure
    
volumes:
  azurite_data:
  cosmos_data:
  esdata:
